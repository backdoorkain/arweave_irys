<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arweave Explorer & Uploader</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-6 space-y-8">
        
        <!-- Encabezado -->
        <header class="text-center py-6 border-b border-slate-800">
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">
                Arweave Permaweb Box
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Sube y almacena archivos para siempre en la blockchain</p>
        </header>

        <!-- Sección de Subida -->
        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">⚡ Sube un nuevo archivo</h2>
            
            <form id="uploadForm" class="space-y-4">
                <div class="border-2 border-dashed border-slate-700 hover:border-amber-500 transition rounded-xl p-6 text-center cursor-pointer relative bg-slate-950">
                    <input type="file" id="fileInput" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <p id="fileLabel" class="text-slate-400 text-sm">Arrastra tu archivo aquí o haz clic para buscar</p>
                </div>
                
                <button type="submit" id="btnSubmit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-orange-900/20 active:scale-[0.99]">
                    Subir a la Red Principal
                </button>
            </form>
            
            <!-- Notificaciones -->
            <div id="statusMessage" class="mt-4 p-3 rounded-lg text-sm font-medium hidden"></div>
        </section>

        <!-- Sección de Listado -->
        <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2">📁 Tus Archivos Guardados</h2>
                <button id="btnRefresh" class="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 py-1.5 px-3 rounded-lg transition">
                    🔄 Actualizar
                </button>
            </div>

            <div id="loadingList" class="text-center text-slate-500 py-8 hidden">Buscando transacciones en Arweave...</div>

            <!-- Tabla/Lista de Archivos -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="border-b border-slate-800 text-slate-400">
                            <th class="pb-3 font-semibold">Nombre</th>
                            <th class="pb-3 font-semibold">Tipo</th>
                            <th class="pb-3 font-semibold text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="filesTableBody" class="divide-y divide-slate-800/50">
                        <!-- Se llena dinámicamente -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Lógica de Frontend -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const uploadForm = document.getElementById('uploadForm');
        const statusMessage = document.getElementById('statusMessage');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnRefresh = document.getElementById('btnRefresh');
        const filesTableBody = document.getElementById('filesTableBody');
        const loadingList = document.getElementById('loadingList');

        // Mostrar nombre del archivo seleccionado
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                fileLabel.innerText = `Seleccionado: ${e.target.files[0].name}`;
                fileLabel.classList.remove('text-slate-400');
                fileLabel.classList.add('text-amber-400', 'font-medium');
            }
        });

        // Enviar formulario de subida
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // Deshabilitar UI durante carga
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Firmando y enviando transacción AR...";
            showMessage('Procesando archivo en el servidor y transmitiendo a la blockchain...', 'bg-blue-950 border border-blue-800 text-blue-300');

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    showMessage(`🎉 ¡Enviado con éxito! ID de Transacción: ${data.txId}. Aparecerá en la lista en unos minutos.`, 'bg-emerald-950 border border-emerald-800 text-emerald-300');
                    uploadForm.reset();
                    fileLabel.innerText = "Arrastra tu archivo aquí o haz clic para buscar";
                    fileLabel.className = "text-slate-400 text-sm";
                    setTimeout(loadFiles, 2000);
                } else {
                    showMessage(`❌ Error: ${data.error}`, 'bg-rose-950 border border-rose-800 text-rose-300');
                }
            } catch (err) {
                showMessage(`❌ Error de conexión al servidor`, 'bg-rose-950 border border-rose-800 text-rose-300');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Subir a la Red Principal";
            }
        });

        // Cargar lista de archivos mediante GraphQL
        async function loadFiles() {
            loadingList.classList.remove('hidden');
            filesTableBody.innerHTML = '';
            
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                
                if (data.success && data.files.length > 0) {
                    data.files.forEach(file => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-900/40 transition";
                        tr.innerHTML = `
                            <td class="py-3 font-medium text-slate-200 max-w-[200px] truncate">${file.name}</td>
                            <td class="py-3 text-slate-400 text-xs">${file.type}</td>
                            <td class="py-3 text-right">
                                <a href="${file.url}" target="_blank" class="inline-flex items-center gap-1 bg-slate-800 hover:bg-slate-700 text-amber-400 px-3 py-1.5 rounded-lg text-xs font-semibold transition border border-slate-700">
                                    ⬇️ Descargar
                                </a>
                            </td>
                        `;
                        filesTableBody.appendChild(tr);
                    });
                } else {
                    filesTableBody.innerHTML = `<tr><td colspan="3" class="text-center text-slate-500 py-6">No se encontraron archivos subidos por esta app todavía.</td></tr>`;
                }
            } catch (err) {
                filesTableBody.innerHTML = `<tr><td colspan="3" class="text-center text-rose-400 py-6">Error al cargar la lista.</td></tr>`;
            } finally {
                loadingList.classList.add('hidden');
            }
        }

        function showMessage(text, classes) {
            statusMessage.innerText = text;
            statusMessage.className = `mt-4 p-3 rounded-lg text-sm font-medium ${classes}`;
        }

        btnRefresh.addEventListener('click', loadFiles);
        
        // Carga inicial al abrir la página
        window.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
